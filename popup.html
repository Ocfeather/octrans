<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>OcTrans 翻译</h1>

    <button id="toggle" class="toggle">开启翻译</button>

    <div class="capture-row">
      <button id="capture" class="capture">截图翻译（框选区域 / 视频）</button>
      <label class="capture-toggle" title="关闭后截图翻译按钮和 Alt+Shift+S 均不生效">
        <input id="captureEnabled" type="checkbox" />
        启用
      </label>
    </div>

    <div class="field">
      <label for="endpoint">API 地址</label>
      <input id="endpoint" type="text" placeholder="https://api.deepseek.com/chat/completions" />
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." />
    </div>

    <div class="field">
      <label for="model">模型（文本翻译）</label>
      <div class="model-row">
        <div class="combo">
          <input id="model" placeholder="deepseek-chat" />
          <button type="button" class="combo-toggle" data-for="model">▾</button>
          <ul class="combo-list" id="modelList"></ul>
        </div>
        <button id="refreshModels" class="refresh" title="获取模型列表">↻</button>
      </div>
    </div>

    <div class="section">图片翻译（视觉模型）</div>

    <div class="field">
      <label for="visionEndpoint">视觉 API 地址</label>
      <input id="visionEndpoint" type="text" placeholder="留空 = 与上方文本相同" />
    </div>

    <div class="field">
      <label for="visionApiKey">视觉 API Key</label>
      <input id="visionApiKey" type="password" placeholder="留空 = 与上方文本相同" />
    </div>

    <div class="field">
      <label for="visionModel">图片翻译模型</label>
      <div class="model-row">
        <div class="combo">
          <input id="visionModel" placeholder="如 glm-5v-turbo（可手动输入）" />
          <button type="button" class="combo-toggle" data-for="visionModel">▾</button>
          <ul class="combo-list" id="visionModelList"></ul>
        </div>
        <button id="refreshVisionModels" class="refresh" title="获取视觉模型列表">↻</button>
      </div>
    </div>

    <div class="field check">
      <input id="imageEnabled" type="checkbox" />
      <label for="imageEnabled">启用图片翻译（悬停图片显示「译图」按钮）</label>
    </div>

    <div class="field">
      <label for="mode">翻译模式</label>
      <select id="mode">
        <option value="auto">自动翻译全部</option>
        <option value="button">逐段按钮翻译</option>
      </select>
    </div>

    <div class="field">
      <label for="targetLang">目标语言</label>
      <select id="targetLang">
        <option value="中文">中文</option>
        <option value="English">English</option>
        <option value="日本語">日本語</option>
        <option value="한국어">한국어</option>
        <option value="Français">Français</option>
        <option value="Deutsch">Deutsch</option>
        <option value="Español">Español</option>
      </select>
    </div>

    <button id="save" class="save">保存设置</button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
